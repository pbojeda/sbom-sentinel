# Secret template — do NOT commit real values.
# Use Sealed Secrets, External Secrets Operator, or your vault solution
# to inject real credentials at deploy time.
#
# To create from the command line (base64-encoded values):
#
#   kubectl create secret generic sbom-sentinel-secrets \
#     --namespace security \
#     --from-literal=GIT_TOKEN='your-token-here' \
#     --from-literal=SLACK_WEBHOOK_URL='https://hooks.slack.com/services/...' \
#     --dry-run=client -o yaml | kubectl apply -f -

apiVersion: v1
kind: Secret
metadata:
  name: sbom-sentinel-secrets
  namespace: security
type: Opaque
stringData:
  # Platform-specific tokens (take priority over GIT_TOKEN when set)
  # GitHub — Personal Access Token for github.com repositories
  # GITHUB_TOKEN: "REPLACE_ME"
  # GITHUB_USER: "x-token-auth"

  # Bitbucket — App Password or Repository Access Token for bitbucket.org repos
  # BITBUCKET_TOKEN: "REPLACE_ME"
  # BITBUCKET_USER: "your-bitbucket-username"

  # Fallback token for other platforms or mixed setups
  # GIT_TOKEN: "REPLACE_ME"
  # GIT_USER: "x-token-auth"

  # Optional — Slack incoming webhook URL
  # SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/T000/B000/xxxx"

  # Optional — SMTP credentials for email notifications
  # SMTP_HOST: "smtp.example.com"
  # SMTP_PORT: "587"
  # SMTP_USER: "alerts@example.com"
  # SMTP_PASS: "REPLACE_ME"
  # EMAIL_FROM: "alerts@example.com"
  # EMAIL_TO: "security@example.com,devops@example.com"
