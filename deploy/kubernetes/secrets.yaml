# Secret template — do NOT commit real values.
#
# Create or update the secret with kubectl (values come from your .env file):
#
#   kubectl create secret generic sbom-sentinel-secrets \
#     --namespace i360 \
#     --from-literal=BITBUCKET_TOKEN_I10_USERS='ATBB...' \
#     --from-literal=BITBUCKET_TOKEN_I11_MEDICAL='ATBB...' \
#     --from-literal=BITBUCKET_TOKEN_I12_GENERAL='ATBB...' \
#     --from-literal=SLACK_WEBHOOK_URL='https://hooks.slack.com/services/...' \
#     --from-literal=STORAGE_PROVIDER='ibm-cos' \
#     --from-literal=IBM_COS_ENDPOINT='https://s3.eu-es.cloud-object-storage.appdomain.cloud' \
#     --from-literal=IBM_COS_BUCKET='sbom-sentinel' \
#     --from-literal=IBM_COS_ACCESS_KEY_ID='...' \
#     --from-literal=IBM_COS_SECRET_ACCESS_KEY='...' \
#     --from-literal=IBM_COS_REGION='eu-es' \
#     --from-literal=IBM_COS_PUBLIC_URL='https://sbom-sentinel.s3.eu-es.cloud-object-storage.appdomain.cloud' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# To update a single value without recreating:
#
#   kubectl patch secret sbom-sentinel-secrets -n i360 \
#     --type=merge \
#     -p '{"stringData":{"BITBUCKET_TOKEN_I10_USERS":"new-token-here"}}'

apiVersion: v1
kind: Secret
metadata:
  name: sbom-sentinel-secrets
  namespace: i360
type: Opaque
stringData:
  # Bitbucket per-repo tokens (free plan — repository-level HTTP access tokens)
  BITBUCKET_TOKEN_I10_USERS: "REPLACE_ME"
  BITBUCKET_TOKEN_I11_MEDICAL: "REPLACE_ME"
  BITBUCKET_TOKEN_I12_GENERAL: "REPLACE_ME"

  # Slack webhook
  SLACK_WEBHOOK_URL: "REPLACE_ME"

  # IBM Cloud Object Storage (HMAC credentials, Writer role)
  STORAGE_PROVIDER: "ibm-cos"
  IBM_COS_ENDPOINT: "https://s3.eu-es.cloud-object-storage.appdomain.cloud"
  IBM_COS_BUCKET: "sbom-sentinel"
  IBM_COS_ACCESS_KEY_ID: "REPLACE_ME"
  IBM_COS_SECRET_ACCESS_KEY: "REPLACE_ME"
  IBM_COS_REGION: "eu-es"
  IBM_COS_PUBLIC_URL: "https://sbom-sentinel.s3.eu-es.cloud-object-storage.appdomain.cloud"
