apiVersion: batch/v1
kind: CronJob
metadata:
  name: sbom-sentinel
  namespace: i360
  labels:
    app: sbom-sentinel
spec:
  schedule: "0 2 * * *"          # 02:00 UTC daily
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  suspend: false
  concurrencyPolicy: Forbid       # skip if previous run is still active

  jobTemplate:
    spec:
      parallelism: 1
      completions: 1
      backoffLimit: 1             # retry once on failure
      activeDeadlineSeconds: 3600 # kill after 1 hour
      template:
        metadata:
          labels:
            app: sbom-sentinel
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: "insulcloud-registry-secret"
          containers:
            - name: sbom-sentinel
              image: de.icr.io/insulcloud360/sbom-sentinel:latest
              imagePullPolicy: Always
              args: ["scan"]

              # All secrets (tokens, Slack, IBM COS) come from the K8s Secret
              envFrom:
                - secretRef:
                    name: sbom-sentinel-secrets

              # Non-sensitive overrides
              env:
                - name: SENTINEL_OUTPUT_DIR
                  value: /app/artifacts
                - name: LOG_LEVEL
                  value: info

              resources:
                requests:
                  cpu: 500m
                  memory: 512Mi
                limits:
                  cpu: "2"
                  memory: 2Gi

              volumeMounts:
                - name: config
                  mountPath: /app/sbom-sentinel.config.json
                  subPath: sbom-sentinel.config.json
                  readOnly: true
                - name: artifacts
                  mountPath: /app/artifacts

          volumes:
            - name: config
              configMap:
                name: sbom-sentinel-config
            # Reports are uploaded to IBM COS after each scan — no PVC needed.
            # emptyDir is cleaned up automatically when the pod finishes.
            - name: artifacts
              emptyDir: {}
